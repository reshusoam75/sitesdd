<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieVerse</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#141414;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:black;
}

.logo{
font-size:26px;
font-weight:bold;
color:red;
}

nav a{
margin-left:20px;
color:white;
text-decoration:none;
}

/* HERO */

.hero{
height:60vh;
background:linear-gradient(to top,black,transparent),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");
background-size:cover;
display:flex;
flex-direction:column;
justify-content:center;
padding-left:50px;
}

.hero h1{
font-size:50px;
}

.hero p{
margin-top:10px;
color:#ddd;
}

.btn{
margin-top:20px;
padding:12px 30px;
background:red;
color:white;
text-decoration:none;
border-radius:5px;
display:inline-block;
}

/* MOVIE GRID */

.section{
padding:40px;
}

.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.movie{
overflow:hidden;
border-radius:10px;
transition:0.3s;
cursor:pointer;
}

.movie img{
width:100%;
display:block;
}

.movie:hover{
transform:scale(1.1);
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:black;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">🎬 MovieVerse</div>

<nav>
<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Series</a>
<a href="#">Trending</a>
</nav>

</header>

<section class="hero">

<h1>Unlimited Movies</h1>

<p>Join our Telegram for latest updates</p>

<a class="btn" href="https://t.me/yourchannel">Join Telegram</a>

</section>

<div class="section">

<h2>Trending Movies</h2>

<div class="movies">

<div class="movie">
<img src="https://via.placeholder.com/200x300">
</div>

<div class="movie">
<img src="https://via.placeholder.com/200x300">
</div>

<div class="movie">
<img src="https://via.placeholder.com/200x300">
</div>

<div class="movie">
<img src="https://via.placeholder.com/200x300">
</div>

<div class="movie">
<img src="https://via.placeholder.com/200x300">
</div>

</div>

</div>

<footer>

© 2026 MovieVerse

</footer>

</body>
</html>
