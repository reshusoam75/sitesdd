<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Magic Hub</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:36px;
color:#38bdf8;
}

.hero p{
color:#cbd5f5;
margin-top:10px;
}

.telegram-btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#22c55e;
color:white;
text-decoration:none;
font-size:18px;
border-radius:8px;
}

.telegram-btn:hover{
background:#16a34a;
}

.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
padding:40px;
}

.movie{
background:#1e293b;
padding:10px;
border-radius:8px;
text-align:center;
}

.movie img{
width:100%;
border-radius:5px;
}

footer{
text-align:center;
padding:20px;
background:#020617;
margin-top:40px;
}

</style>

</head>

<body>

<header>
🎬 Movie Magic Hub
</header>

<section class="hero">

<h1>Latest Movies & Web Series</h1>

<p>Join our Telegram channel for daily movie updates</p>

<a class="telegram-btn" href="https://t.me/yourchannel">
Join Telegram
</a>

</section>

<section class="movies">

<div class="movie">
<img src="https://via.placeholder.com/150">
<p>Latest Movie</p>
</div>

<div class="movie">
<img src="https://via.placeholder.com/150">
<p>New Web Series</p>
</div>

<div class="movie">
<img src="https://via.placeholder.com/150">
<p>Trending Movie</p>
</div>

<div class="movie">
<img src="https://via.placeholder.com/150">
<p>HD Movies</p>
</div>

</section>

<footer>
© 2026 Movie Magic Hub
</footer>

</body>
</html>
