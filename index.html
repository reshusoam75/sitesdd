<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema Hub</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b0b;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#111;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
color:#00e5ff;
font-weight:bold;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
font-size:14px;
}

/* HERO */

.hero{
text-align:center;
padding:70px 20px;
background:linear-gradient(to bottom,#111,#000);
}

.hero h1{
font-size:36px;
margin-bottom:10px;
}

.hero p{
color:#aaa;
}

.join-btn{
display:inline-block;
margin-top:25px;
padding:12px 30px;
background:#00e5ff;
color:black;
border-radius:30px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.join-btn:hover{
background:#00bcd4;
}

/* SEARCH */

.search{
text-align:center;
margin-top:20px;
}

.search input{
width:60%;
padding:10px;
border-radius:20px;
border:none;
outline:none;
}

/* MOVIE GRID */

.container{
padding:40px;
}

.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
}

.movie{
background:#111;
border-radius:8px;
overflow:hidden;
transition:0.3s;
}

.movie:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00e5ff;
}

.movie img{
width:100%;
}

.movie p{
text-align:center;
padding:10px;
font-size:14px;
}

/* TELEGRAM SECTION */

.telegram{
background:#111;
text-align:center;
padding:50px 20px;
margin-top:40px;
}

.telegram h2{
margin-bottom:10px;
}

.telegram a{
background:#0088cc;
padding:12px 25px;
color:white;
text-decoration:none;
border-radius:25px;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#000;
color:#777;
}

</style>

</head>

<body>

<header>

<div class="logo">🎬 CinemaHub</div>

<nav>
<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Web Series</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Latest Movies & Web Series</h1>

<p>Watch updates and join our Telegram channel</p>

<a class="join-btn" href="https://t.me/yourchannel">Join Telegram</a>

</section>

<div class="search">
<input type="text" placeholder="Search movies...">
</div>

<div class="container">

<h2>Trending Movies</h2>

<div class="movies">

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/8Vt6mWEReuy4Of61Lnj5Xj704m8.jpg">
<p>Spider Man</p>
</div>

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg">
<p>Doctor Strange</p>
</div>

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">
<p>Avengers</p>
</div>

<div class="movie">
<img src="https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg">
<p>Joker</p>
</div>

</div>

</div>

<section class="telegram">

<h2>Join Our Telegram Channel</h2>
<p>Daily movie updates and new releases</p>

<a href="https://t.me/yourchannel">Join Now</a>

</section>

<footer>

© 2026 CinemaHub

</footer>

</body>
</html>
